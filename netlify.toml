[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

[functions]
  node_bundler = "esbuild"

# Edge Function: inject correct SEO meta tags per-route into the HTML
[[edge_functions]]
  function = "inject-meta"
  path = "/*"

[[redirects]]
  from = "/api/*"
  to = "https://hvac-campaigns-essex-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/google-ads-import.csv"
  to = "/google-ads-import.csv"
  status = 200
  force = true

[[redirects]]
  from = "/247-partners.html"
  to = "/247-partners.html"
  status = 200
  force = true

# ── 301 Redirects for old/renamed URLs (GSC redirect validation fixes) ──
[[redirects]]
  from = "/blog/how-to-apply-pseg-rebate-nj"
  to = "/blog/pseg-rebate-application-process"
  status = 301
  force = true

[[redirects]]
  from = "/blog/r22-replacement-cost-nj"
  to = "/blog/how-much-does-r22-replacement-cost-nj"
  status = 301
  force = true

[[redirects]]
  from = "/blog/warehouse-lighting-hvac-direct-install-nj"
  to = "/blog/warehouse-hvac-nj"
  status = 301
  force = true

[[redirects]]
  from = "/blog/old-ac-replacement-nj-rebates"
  to = "/blog/central-ac-replacement-nj-cost"
  status = 301
  force = true

[[redirects]]
  from = "/blog/nj-direct-install-program-commercial-guide"
  to = "/direct-install"
  status = 301
  force = true

# ── SPA catch-all (must be last) ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
