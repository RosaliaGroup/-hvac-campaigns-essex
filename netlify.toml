[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"

[functions]
  node_bundler = "esbuild"

[functions."takeoff-analyze"]
  included_files = []

[[redirects]]
  from = "/api/*"
  to = "https://hvac-campaigns-essex-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/google-ads-import.csv"
  to = "/google-ads-import.csv"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

